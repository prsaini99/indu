services:
  postgres:
    image: postgres:16
    container_name: indu-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: indu
      POSTGRES_PASSWORD: indu123
      POSTGRES_DB: indu_dev
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
